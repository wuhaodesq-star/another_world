name: Docker build

on:
  push:
    branches: [main]
    paths:
      - "docker/**"
      - "pyproject.toml"
      - ".github/workflows/docker.yml"
  pull_request:
    branches: [main]
    paths:
      - "docker/**"
      - "pyproject.toml"
      - ".github/workflows/docker.yml"

jobs:
  build:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [Dockerfile.train, Dockerfile.infer]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.image }}
          push: false
          tags: another-world/${{ matrix.image }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
