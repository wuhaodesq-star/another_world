# Smoke test training config.
# 100 steps, tiny batch, runs on a single CPU or 1 GPU.

steps: 100
batch_size: 4
grad_accum: 1
lr: 3.0e-4
weight_decay: 0.1
betas: [0.9, 0.95]
eps: 1.0e-8
warmup_steps: 10
grad_clip: 1.0
log_every: 10
ckpt_every: 100
device: auto          # auto | cpu | cuda | cuda:0
precision: fp32       # fp32 | bf16 | fp16
compile: false
seed: ${seed}
